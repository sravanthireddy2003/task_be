# =====================================================
# 3) LOGSTASH CONFIGURATION
# =====================================================

input {
  jdbc {
    # MySQL JDBC connection
    jdbc_connection_string => "jdbc:mysql://localhost:3306/your_database_name?useSSL=false&serverTimezone=UTC"
    jdbc_user => "${MYSQL_USER:root}"
    jdbc_password => "${MYSQL_PASSWORD:password}"
    jdbc_driver_library => "/path/to/mysql-connector-java-8.0.33.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    
    # Poll every minute
    schedule => "* * * * *"
    
    # Track using created_at timestamp
    statement => "
      SELECT 
        id,
        actor_id,
        tenant_id,
        action,
        entity,
        entity_id,
        module,
        ip_address,
        user_agent,
        correlation_id,
        details,
        previous_value,
        new_value,
        createdAt
      FROM audit_logs 
      WHERE createdAt > :sql_last_value
      ORDER BY createdAt ASC
    "
    
    # Use createdAt column for tracking
    use_column_value => true
    tracking_column => "createdAt"
    tracking_column_type => "timestamp"
    
    # Store last run timestamp
    last_run_metadata_path => "/var/lib/logstash/.logstash_jdbc_last_run_audit_logs"
    
    # Clean shutdown
    clean_run => false
    
    # Type identifier
    type => "audit_log"
  }
}

filter {
  # Convert createdAt to @timestamp
  date {
    match => ["createdAt", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
    target => "@timestamp"
    timezone => "UTC"
  }
  
  # Parse JSON fields
  if [details] {
    json {
      source => "details"
      target => "details_parsed"
      skip_on_invalid_json => true
    }
  }
  
  if [previous_value] {
    json {
      source => "previous_value"
      target => "previous_value_parsed"
      skip_on_invalid_json => true
    }
  }
  
  if [new_value] {
    json {
      source => "new_value"
      target => "new_value_parsed"
      skip_on_invalid_json => true
    }
  }
  
  # Add computed fields
  mutate {
    add_field => {
      "[@metadata][index_date]" => "%{+YYYY.MM.dd}"
      "log_type" => "audit"
    }
  }
  
  # Convert tenant_id to keyword for filtering
  mutate {
    convert => {
      "tenant_id" => "integer"
      "id" => "integer"
    }
  }
  
  # Enrich with user role (optional - requires lookup)
  # elasticsearch {
  #   hosts => ["localhost:9200"]
  #   index => "users"
  #   query => "actor_id:%{actor_id}"
  #   fields => { "role" => "actor_role" }
  # }
  
  # Remove raw JSON strings to save space
  mutate {
    remove_field => ["@version"]
  }
}

output {
  # Output to Elasticsearch with date-based index
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "audit-logs-%{[@metadata][index_date]}"
    document_id => "%{id}"
    
    # Template management
    manage_template => true
    template_name => "audit-logs"
    template_overwrite => true
  }
  
  # Debug output to console (remove in production)
  stdout {
    codec => rubydebug {
      metadata => true
    }
  }
}
