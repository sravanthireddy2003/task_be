input {
  # 1. File Input: Reads real-time application logs written by Winston logger
  file {
    path => "c:/Users/Administrator/Pictures/TM-F/task_be/logs/app.log" # Updated this to the full Windows absolute path
    start_position => "beginning"
    sincedb_path => "c:/Users/Administrator/Pictures/TM-F/task_be/logstash_data/.sincedb_app_logs" # Use local project folder to avoid permissions issues
    codec => "json" # Since Winston writes newline-delimited JSON structure
    type => "app-log"
  }

  # 2. JDBC Input: Reads new rows from the MySQL audit_logs table incrementally
  jdbc {
    clean_run => false
    jdbc_driver_library => "${LOGSTASH_JDBC_DRIVER_PATH:C:/mysql-connector-j-9.6.0/mysql-connector-j-9.6.0.jar}" # Ensure you update this path if the JAR is somewhere else!
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    jdbc_connection_string => "jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:market_task_db}?useSSL=false&allowPublicKeyRetrieval=true"
    jdbc_user => "${DB_USER:root}"
    jdbc_password => "${DB_PASSWORD:}"
    
    # Query configuration with incremental synchronization based on `createdAt` timestamp
    statement => "SELECT * FROM audit_logs WHERE createdAt > :sql_last_value ORDER BY createdAt ASC"
    
    # Enable timestamp tracking
    use_column_value => true
    tracking_column => "createdAt"
    tracking_column_type => "timestamp"
    
    # Store the last run metadata file so it knows where it left off across restarts
    record_last_run => true
    last_run_metadata_path => "${LOGSTASH_METADATA_PATH:c:/Users/Administrator/Pictures/TM-F/task_be/logstash_data/.logstash_jdbc_last_run_audit_logs}"
    
    # Schedule to poll every minute
    schedule => "${LOGSTASH_POLL_INTERVAL:* * * * *}"

    type => "audit-log"
  }
}

filter {
  if [type] == "app-log" {
    # Parse timestamps for better indexing
    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601" ]
      target => "@timestamp"
    }

    # Ensure empty arrays or undefined fields are pruned if necessary
  }

  if [type] == "audit-log" {
    # If the details columns contain JSON text, we can parse it here
    if [details] {
      json {
        source => "details"
        target => "details_parsed"
        skip_on_invalid_json => true
      }
    }
    
    if [previous_value] {
      json {
        source => "previous_value"
        target => "previous_value_parsed"
        skip_on_invalid_json => true
      }
    }

    if [new_value] {
      json {
        source => "new_value"
        target => "new_value_parsed"
        skip_on_invalid_json => true
      }
    }

    date {
      match => [ "createdAt", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  if [type] == "app-log" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:https://localhost:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "LQIsa7N4ZkhEUnZgWGxr"
      index => "demo-logs-app-%{+YYYY.MM.dd}"
      ssl_verification_mode => none
    }
  }

  if [type] == "audit-log" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:https://localhost:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "LQIsa7N4ZkhEUnZgWGxr"
      index => "demo-logs-audit-%{+YYYY.MM.dd}"
      document_id => "%{id}"
      ssl_verification_mode => none
    }
  }

  # Optional console output for troubleshooting
  # stdout {
  #   codec => rubydebug
  # }
}
